<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JobFlow</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<canvas id="bg-canvas"></canvas>

<div class="container">

  <div class="layout">

    <div class="jobs-header">

      <h1 id="main-title">JobFlow</h1>

      <div id="updated"></div>

      <div class="search-bar">
        <input 
          id="search-input" 
          type="text" 
          placeholder="rig, rigging, technical artist, vfx" 
        />
        <button id="search-button">🔍</button>
      </div>

      <div class="filters">
        <button class="filter-btn active" data-site="WorkWithIndies">WorkWithIndies</button>
        <button class="filter-btn active" data-site="Remotive Game Dev">Game Dev</button> 
        <button class="filter-btn active" data-site="Remote OK Dev">Remote Dev</button> 
        <button class="filter-btn active" data-site="Remote Game Jobs">Remote Game Jobs</button>
        <button class="filter-btn active" data-site="ArcDev">Arc Dev</button>


        <button class="filter-btn active" data-site="GameDev.net Jobs">GameDev.net</button>
        <button class="filter-btn active" data-site="Polycount Freelance">Polycount</button>
        <button class="filter-btn active" data-site="BlenderArtists Paid Jobs">BlenderArtists</button>
        <button class="filter-btn active" data-site="ImageCampus">ImageCampus</button>
        <button class="filter-btn active" data-site="Entertainment Careers">Entertainment Careers</button>
      </div>

    </div>

    <div id="jobs" class="jobs-list"></div>

  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="background.js"></script>
<script src="app.js"></script>

</body>
</html>

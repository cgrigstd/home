<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JOBFLOW — EDGE</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="bg-stripe"></div>
<div class="bg-dot-grid"></div>
<div class="hero-ghost"><span>JOBFLOW</span></div>

<div class="container">

  <div class="top-bar">
    <div class="brand">
      <div class="brand-mark"></div>
      <h1>JOB<span class="accent">FLOW</span></h1>
    </div>
    <div class="search-area">
      <input id="search-input" type="text" placeholder="rig, rigging, technical artist, vfx">
      <button id="search-button">→</button>
    </div>
    <a class="donate-btn" href="https://www.paypal.com/donate/?business=pabloromeroanimator@gmail.com" target="_blank" rel="noopener">donate ♡</a>
    <span class="donate-msg">Your support keeps this tool improving</span>
  </div>

  <div class="filter-row">
    <button class="filter-btn" data-site="WorkWithIndies">WorkWithIndies</button>
    <button class="filter-btn" data-site="Remotive Game Dev">Game Dev</button>
    <button class="filter-btn" data-site="Remote OK Dev">Remote Dev</button>
    <button class="filter-btn" data-site="Remote Game Jobs">Remote Game Jobs</button>
    <button class="filter-btn" data-site="GameDev.net Jobs">GameDev.net</button>
    <button class="filter-btn" data-site="Polycount Freelance">Polycount</button>
    <button class="filter-btn" data-site="BlenderArtists Paid Jobs">BlenderArtists</button>
    <button class="filter-btn" data-site="ImageCampus">ImageCampus</button>
    <button class="filter-btn" data-site="Entertainment Careers">Entertainment Careers</button>
  </div>

  <div class="pagination-row">
    <button id="prev-page" disabled>←</button>
    <span class="page-info" id="page-info">1 / 1</span>
    <button id="next-page" disabled>→</button>
    <span class="jobs-count" id="updated"></span>
  </div>

  <div class="jobs-grid" id="jobs"></div>

  <div class="footer-bar">
    <span>JOBFLOW &mdash; Find your next role</span>
  </div>

</div>

<script src="app.js"></script>

</body>
</html>

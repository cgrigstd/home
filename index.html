<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CG RIGS</title>
<link rel="stylesheet" href="./styles.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="icon" href="./assets/cgrigs-logo.svg">
</head>

<body>

<div id="loader">
  <img id="loaderLogo" class="loader-logo">
</div>

<nav class="navbar">
  <div class="nav-logo">
    <img id="navLogo">
  </div>
  <div class="nav-links">
    <a href="#reel">Reel</a>
    <a href="#productionRigs">Rigs</a>
    <a href="#tools">Tools</a>
    <a href="#games">Games</a>
    <a href="#skills">Skills</a>
  </div>
</nav>

<header class="hero">

  <div class="hero-container">

    <div class="hero-left">

      <div class="hero-image">
        <img id="profileImage">
      </div>

      <h1 class="hero-title">
        <span id="heroName"></span>
        <span id="heroLastName"></span>
        <div class="hero-area">
          <span id="area"></span>
        </div>
      </h1>

    </div>

    <div class="hero-content">

      <p id="heroDescription"></p>

      <div class="hero-buttons">
          <a href="mailto:cgrig.td@gmail.com" target="_blank">
            <img src="./assets/email.svg">
          </a>
          <a href="https://www.instagram.com/cgrigstd/" target="_blank">
            <img src="./assets/instagram.svg">
          </a>
          <a href="https://vimeo.com/user1834075" target="_blank">
            <img src="./assets/vimeo-square.svg">
          </a>
          <a href="https://www.linkedin.com/in/pablo-romero-98602124/" target="_blank">
            <img src="./assets/linkedin.svg">
          </a>
      </div>

    </div>

  </div>
</header>

<div class="hero-solutions">
  <span id="solutions"></span>
</div>

<section id="reel" class="section">
  <h2>Showcase</h2>
  <div class="showcase-container">
    <div id="showcaseCarousel"></div>
  </div>
  <h2>Demo Reel</h2>
  <div class="video-container">
    <iframe id="demoReel" frameborder="0" allowfullscreen></iframe>
  </div>

  <h2>Short Unreal Engine</h2>
  <div class="video-container">
    <iframe id="shortRealTime" frameborder="0" allowfullscreen></iframe>
  </div>
</section>

<section id="productionRigs" class="section">
  <h2>Production Rigs</h2>
  <div id="productionrigsContainer" class="card-grid"></div>
</section>

<section id="rigs" class="section">
  <h2>Realtime Rigs</h2>
  <div id="rigsContainer" class="card-grid"></div>
</section>

<section id="tools" class="section">
  <h2>Tools & Assets</h2>
  <div id="toolsContainer" class="card-grid"></div>
</section>

<section id="games" class="section">
  <h2>Games</h2>
  <div id="gamesContainer" class="card-grid"></div>
</section>

<footer id="skills">

  <h2 class="footer-title">Skills</h2>

  <div class="footer-skills">

    <div class="skill-group">
      <h3>3D Software</h3>
      <p id="skillSoftware"></p>
    </div>

    <div class="skill-group">
      <h3>Game Engines</h3>
      <p id="skillEngines"></p>
    </div>

    <div class="skill-group">
      <h3>Human System Pipeline</h3>
      <p id="humansystempipeline"></p>
    </div>

    <div class="skill-group">
      <h3>Programming</h3>
      <p id="skillLanguages"></p>
    </div>

  </div>

</footer>
<div id="video-modal" class="hidden">
  <video id="project-video" muted></video>
</div>
<script src="./app.js"></script>

</body>
</html>
